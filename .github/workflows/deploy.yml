name: Deploy Core

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitLab Registry
        run: echo "${{ secrets.CI_REGISTRY_PASSWORD }}" | docker login registry.gitlab.com -u ${{ secrets.CI_REGISTRY_USER }} --password-stdin

      - name: Build and push
        run: |
          docker build -t registry.gitlab.com/synthetis-tech/solenix-core:${{ github.sha }} -t registry.gitlab.com/synthetis-tech/solenix-core:latest .
          docker push registry.gitlab.com/synthetis-tech/solenix-core:${{ github.sha }}
          docker push registry.gitlab.com/synthetis-tech/solenix-core:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to k8s
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" > ~/.kube/config
          kubectl set image deployment/core core=registry.gitlab.com/synthetis-tech/solenix-core:${{ github.sha }} -n solenix
          kubectl rollout status deployment/core -n solenix