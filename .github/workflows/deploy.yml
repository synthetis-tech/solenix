name: Deploy Core

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          IMAGE=ghcr.io/synthetis-tech/solenix-core
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to k8s
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" > ~/.kube/config
          kubectl set image deployment/core core=ghcr.io/synthetis-tech/solenix-core:${{ github.sha }} -n solenix
          kubectl rollout status deployment/core -n solenix