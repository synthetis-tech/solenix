version: 2

project_name: solenix

before:
  hooks:
    - go mod tidy

builds:
  - id: solenix
    main: ./cmd/solenix
    binary: solenix
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: solenix
    builds: [solenix]
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: solenix
    repository:
      owner: synthetis-tech
      name: homebrew-solenix
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://synthetis.tech"
    description: "Lightweight time-series database with built-in UI"
    license: "MIT"
    install: |
      bin.install "solenix"
    test: |
      system "#{bin}/solenix", "--version"
