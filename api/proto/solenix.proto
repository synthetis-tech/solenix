syntax = "proto3";

package solenix;

option go_package = "github.com/synthetis-tech/solenix/api/proto;solenixpb";

service SolenixDB {
  rpc Push(PushRequest)             returns (PushResponse);
  rpc Query(QueryRequest)           returns (QueryResponse);
  rpc Subscribe(SubscribeRequest)   returns (stream DataPoint);
  rpc Health(HealthRequest)         returns (HealthResponse);
  rpc Metrics(MetricsRequest)       returns (MetricsResponse);
  rpc DropMetric(DropMetricRequest) returns (DropMetricResponse);
}

// --- Shared ---

message DataPoint {
  int64  timestamp = 1;
  double value     = 2;
}

message Series {
  string              metric = 1;
  map<string, string> labels = 2;
  repeated DataPoint  points = 3;
}

// --- Push ---

message PushRequest {
  repeated Series series = 1;
}

message PushResponse {
  int32 written = 1; // количество записанных серий
}

// --- Query ---

message QueryRequest {
  string              metric = 1;
  map<string, string> labels = 2;
  int64               from   = 3; // Unix nanoseconds, 0 = без ограничения
  int64               to     = 4; // Unix nanoseconds, 0 = без ограничения
  string              window = 5; // опционально: "1m", "5m", "1h" — включает агрегацию
  string              agg    = 6; // опционально: "avg", "min", "max", "sum", "count"
}

message QueryResponse {
  repeated Series series = 1;
}


// --- Subscribe ---

message SubscribeRequest {
  string              metric = 1;
  map<string, string> labels = 2;
}

// Subscribe возвращает поток DataPoint по мере поступления новых данных

// --- Health ---

message HealthRequest {}

message HealthResponse {
  string status  = 1; // "ok"
  string version = 2;
}

// --- Metrics ---

message MetricsRequest {}

message MetricsResponse {
  repeated string metrics = 1;
}

// --- DropMetric ---

message DropMetricRequest {
  string              metric = 1;
  map<string, string> labels = 2; // фильтр по лейблам; пусто = удалить все серии метрики
}

message DropMetricResponse {
  bool dropped = 1; // false если метрика не существовала
}
