<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="./solenix-logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solenix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --accent:  #6c8ef5;
      --green:   #4ade80;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --danger:  #f87171;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .sep  { color: var(--border); }
    .ver  { font-size: 12px; color: var(--muted); }
    .hright { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .dot.dead { background: var(--danger); }

    .cfg-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 3px 10px; border-radius: 5px; font-size: 11px; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .cfg-btn:hover { border-color: var(--accent); color: var(--text); }

    .cfg-panel {
      display: none;
      position: fixed; inset: 0; z-index: 500;
      align-items: flex-start; justify-content: flex-end;
      padding: 56px 16px 0;
      pointer-events: none;
    }
    .cfg-panel.open { display: flex; }
    .cfg-box {
      pointer-events: all;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 300px;
      font-size: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .cfg-box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 12px; }
    .cfg-row { display: flex; justify-content: space-between; gap: 16px; padding: 4px 0; border-bottom: 1px solid var(--border); }
    .cfg-row:last-child { border-bottom: none; }
    .cfg-key { color: var(--muted); }
    .cfg-val { font-family: monospace; color: var(--text); text-align: right; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #filter {
      flex: 1;
      max-width: 360px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    #filter::placeholder { color: var(--muted); }
    #filter:focus { border-color: var(--accent); }

    .tmeta { font-size: 12px; color: var(--muted); }

    /* Time range picker */
    .tr-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; position: relative; }
    .tr-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
      transition: border-color .15s;
    }
    .tr-btn:hover { border-color: var(--accent); }
    .tr-btn svg { color: var(--muted); }
    .tr-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 300; min-width: 160px; overflow: hidden;
    }
    .tr-dropdown.open { display: block; }
    .tr-section { padding: 6px 0; border-bottom: 1px solid var(--border); }
    .tr-section:last-child { border-bottom: none; }
    .tr-label { padding: 4px 14px; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
    .tr-opt {
      display: block; width: 100%; text-align: left;
      padding: 7px 14px; font-size: 13px; color: var(--text);
      background: none; border: none; cursor: pointer;
      transition: background .1s;
    }
    .tr-opt:hover { background: rgba(108,142,245,.1); }
    .tr-opt.active { color: var(--accent); font-weight: 600; }

    .table-wrap {
      flex: 1;
      overflow-y: auto;
    }
    .table-wrap::-webkit-scrollbar { width: 4px; }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead {
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    thead th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: rgba(255,255,255,.025); }
    tbody td { padding: 9px 16px; vertical-align: middle; }

    .metric-name { font-family: monospace; color: var(--accent); font-size: 13px; white-space: nowrap; }
    .tag {
      display: inline-block;
      background: rgba(108,142,245,.08);
      border: 1px solid rgba(108,142,245,.15);
      color: var(--muted);
      padding: 1px 6px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 11px;
      margin: 1px;
      white-space: nowrap;
    }
    .tag b { color: var(--text); font-weight: 500; }
    .val { font-family: monospace; font-size: 13px; font-weight: 600; }
    .ts  { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-icon { opacity: 0.18; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); opacity: 0.5; }
    .empty-hint { font-size: 12px; font-family: monospace; background: var(--surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px; color: var(--muted); }

    tbody tr { cursor: pointer; }

    /* Detail panel */
    .detail {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 420px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
      z-index: 400;
    }
    .detail.open { transform: translateX(0); }

    .detail-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .detail-title { font-family: monospace; color: var(--accent); font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .detail-close {
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 6px;
      border-radius: 4px;
    }
    .detail-close:hover { color: var(--text); background: var(--border); }

    .detail-meta {
      padding: 10px 16px;
      font-size: 11px; color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .detail-body { flex: 1; overflow-y: auto; }
    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .detail-table th {
      text-align: left; padding: 8px 16px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .6px; color: var(--muted);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--surface);
    }
    .detail-table td { padding: 7px 16px; border-bottom: 1px solid rgba(255,255,255,.04); font-family: monospace; }
    .detail-table tr:hover td { background: rgba(255,255,255,.02); }
    .detail-loading { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

    /* Aggregation controls */
    .agg-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .agg-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .agg-select {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 3px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; outline: none;
      transition: border-color .15s;
    }
    .agg-select:focus { border-color: var(--accent); }
    .agg-hint { font-size: 11px; color: var(--muted); margin-left: 2px; }

    /* Chart area */
    .detail-chart-wrap {
      padding: 12px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }
    .detail-chart-wrap canvas { display: block; cursor: crosshair; }

    /* Custom chart tooltip */
    .chart-tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(15, 17, 23, 0.92);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 12px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      transition: opacity .1s ease;
      opacity: 0;
      z-index: 10;
      min-width: 140px;
    }
    .chart-tooltip.visible { opacity: 1; }
    .chart-tooltip-time {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 6px;
      letter-spacing: .2px;
    }
    .chart-tooltip-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 2px 0;
    }
    .chart-tooltip-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chart-tooltip-name { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .chart-tooltip-val  { font-family: monospace; font-weight: 600; color: var(--text); }
  </style>
</head>

<script>
  // ── Time range state ────────────────────────────────────────────────────────
  const RANGES = {
    '5m':  { label: 'Last 5 minutes',  ms: 5   * 60 * 1000 },
    '15m': { label: 'Last 15 minutes', ms: 15  * 60 * 1000 },
    '30m': { label: 'Last 30 minutes', ms: 30  * 60 * 1000 },
    '1h':  { label: 'Last 1 hour',     ms: 60  * 60 * 1000 },
    '6h':  { label: 'Last 6 hours',    ms: 6   * 60 * 60 * 1000 },
    '12h': { label: 'Last 12 hours',   ms: 12  * 60 * 60 * 1000 },
    '24h': { label: 'Last 24 hours',   ms: 24  * 60 * 60 * 1000 },
    '7d':  { label: 'Last 7 days',     ms: 7   * 24 * 60 * 60 * 1000 },
    '30d': { label: 'Last 30 days',    ms: 30  * 24 * 60 * 60 * 1000 },
    'all': { label: 'All time',        ms: 0 },
  };

  let currentRange = '1h';

  // Returns { fromNs, toNs } for the current range (0 = no bound)
  function getTimeRange() {
    const r = RANGES[currentRange];
    if (!r || r.ms === 0) return { fromNs: 0, toNs: 0 };
    const toMs   = Date.now();
    const fromMs = toMs - r.ms;
    return { fromNs: fromMs * 1e6, toNs: toMs * 1e6 };
  }

  // ── Time range picker UI ────────────────────────────────────────────────────
  const trBtn      = document.getElementById('tr-btn');
  const trLabel    = document.getElementById('tr-label');
  const trDropdown = document.getElementById('tr-dropdown');

  trBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    trDropdown.classList.toggle('open');
  });

  document.addEventListener('click', (e) => {
    if (!trDropdown.contains(e.target) && e.target !== trBtn) {
      trDropdown.classList.remove('open');
    }
  });

  trDropdown.addEventListener('click', (e) => {
    const opt = e.target.closest('.tr-opt');
    if (!opt) return;
    const range = opt.dataset.range;
    currentRange = range;
    trLabel.textContent = RANGES[range].label;
    trDropdown.querySelectorAll('.tr-opt').forEach(o => o.classList.toggle('active', o === opt));
    trDropdown.classList.remove('open');
  });
</script>

<script>
  const REFRESH_MS = 10_000;
  let allRows = [];
  let filterVal = '';

  async function load() {
    try {
      const [health, latest] = await Promise.all([
        fetch('/api/health').then(r => r.json()),
        fetch('/api/latest').then(r => r.json()),
      ]);

      document.getElementById('version').textContent = `solenix-core ${health.version}`;
      document.getElementById('dot').classList.remove('dead');
      document.getElementById('status').textContent = 'online';

      allRows = latest.rows || [];
      render();
    } catch {
      document.getElementById('dot').classList.add('dead');
      document.getElementById('status').textContent = 'offline';
    }
  }

  function render() {
    const q = filterVal.trim().toLowerCase();
    const rows = q
      ? allRows.filter(r =>
          r.metric.toLowerCase().includes(q) ||
          Object.entries(r.labels || {}).some(([k, v]) =>
            (k + '=' + v).toLowerCase().includes(q)))
      : allRows;

    document.getElementById('meta').textContent =
      `${rows.length} series · ${new Date().toLocaleTimeString()}`;

    const tbody = document.getElementById('tbody');

    if (rows.length === 0) {
      tbody.innerHTML = q
        ? `<tr><td colspan="4"><div class="empty"><span class="empty-title">No matches</span><span>Try a different filter</span></div></td></tr>`
        : `<tr><td colspan="4"><div class="empty">
            <span class="empty-title">No metrics yet</span>
            <span>Push your first data point to get started</span>
            <span class="empty-hint">solenix push my.metric 42.0</span>
          </div></td></tr>`;
      return;
    }

    tbody.innerHTML = rows.map(r => {
      const tags = Object.entries(r.labels || {});
      const ts   = new Date(r.timestamp / 1e6);
      return `<tr data-metric="${esc(r.metric)}" data-labels="${esc(JSON.stringify(r.labels || {}))}">
        <td><span class="metric-name">${esc(r.metric)}</span></td>
        <td>${tags.map(([k, v]) => `<span class="tag">${esc(k)}=<b>${esc(v)}</b></span>`).join(' ')}</td>
        <td><span class="val">${r.value.toFixed(6)}</span></td>
        <td><span class="ts">${ts.toLocaleTimeString()}</span></td>
      </tr>`;
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('filter').addEventListener('input', e => {
    filterVal = e.target.value;
    render();
  });

  load();
  setInterval(load, REFRESH_MS);

  // Config panel
  const cfgPanel = document.getElementById('cfg-panel');
  const cfgBtn   = document.getElementById('cfg-btn');
  const cfgRows  = document.getElementById('cfg-rows');
  let cfgLoaded  = false;

  cfgBtn.addEventListener('click', async () => {
    const open = cfgPanel.classList.toggle('open');
    if (open && !cfgLoaded) {
      try {
        const cfg = await fetch('/api/config').then(r => r.json());
        const labels = {
          mode:                 'Mode',
          grpc_addr:            'gRPC addr',
          http_addr:            'HTTP addr',
          data_dir:             'Data dir',
          wal_max_size:         'WAL max size',
          flush_interval:       'Flush interval',
          compaction_threshold: 'Compaction threshold',
          retention:            'Retention',
          collector_enabled:    'Collector',
          collector_interval:   'Collector interval',
          auth_enabled:         'Auth',
        };
        cfgRows.innerHTML = Object.entries(labels).map(([k, label]) => {
          let val = cfg[k];
          if (k === 'wal_max_size') val = (val / 1024 / 1024).toFixed(0) + ' MiB';
          if (typeof val === 'boolean') val = val ? 'enabled' : 'disabled';
          return `<div class="cfg-row"><span class="cfg-key">${label}</span><span class="cfg-val">${esc(String(val))}</span></div>`;
        }).join('');
        cfgLoaded = true;
      } catch {
        cfgRows.innerHTML = '<div class="cfg-row"><span class="cfg-key">error loading config</span></div>';
      }
    }
  });

  document.addEventListener('click', (e) => {
    if (!cfgPanel.contains(e.target) && e.target !== cfgBtn) {
      cfgPanel.classList.remove('open');
    }
  });
</script>

<script>
(function() {
  const overlay = document.getElementById('loading-overlay');
  const logoEl  = document.getElementById('loading-logo');
  const outer   = document.getElementById('loading-outer');

  let scale = 1, velocity = 0, target = 1;
  let done = false;
  const STIFFNESS = 0.3, DAMPING = 0.6;

  function loop() {
    const force = (target - scale) * STIFFNESS;
    velocity = (velocity + force) * DAMPING;
    scale += velocity;
    outer.style.transform = `scale(${scale})`;

    if (done && Math.abs(1 - scale) < 0.0005 && Math.abs(velocity) < 0.0005) {
      outer.style.transform = 'scale(1)';
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 450);
      return;
    }
    requestAnimationFrame(loop);
  }

  // pop logo in, then fire double-tap: press→10ms→release→10ms→press→10ms→release
  setTimeout(() => {
    logoEl.style.opacity = '1';
    logoEl.style.transform = 'scale(1)';
    setTimeout(() => {
      requestAnimationFrame(loop);
      target = 0.6;                                          // tap 1 down
      setTimeout(() => { target = 1.0; }, 100);               // tap 1 up
      setTimeout(() => { target = 0.6; }, 200);               // tap 2 down
      setTimeout(() => { target = 1.0; }, 120);               // tap 2 up  — 400ms pause —
      setTimeout(() => { target = 0.6; }, 300);              // tap 3 down
      setTimeout(() => { target = 1.0; }, 300);              // tap 3 up
      setTimeout(() => { target = 0.6; }, 500);              // tap 4 down
      setTimeout(() => { target = 1.0; done = true; }, 500); // tap 4 up → settle → fade
    }, 150);
  }, 80);
})();
</script>

<script>
// Detail panel
(function() {
  const detail          = document.getElementById('detail');
  const detailTitle     = document.getElementById('detail-title');
  const detailMeta      = document.getElementById('detail-meta');
  const detailBody      = document.getElementById('detail-body');
  const detailClose     = document.getElementById('detail-close');
  const detailChartWrap = document.getElementById('detail-chart-wrap');
  const detailCanvas    = document.getElementById('detail-chart');

  let chartInstance = null;

  const SERIES_COLORS = [
    '#6c8ef5', '#4ade80', '#f59e0b', '#f87171',
    '#a78bfa', '#38bdf8', '#fb923c', '#34d399',
  ];

  // Create tooltip DOM once
  const tooltip = document.createElement('div');
  tooltip.className = 'chart-tooltip';
  detailChartWrap.appendChild(tooltip);

  // Crosshair + glow plugin
  const crosshairPlugin = {
    id: 'crosshair',
    afterDraw(chart) {
      const x = chart._hoverX;
      if (x == null) return;
      const { top, bottom } = chart.chartArea;
      const ctx = chart.ctx;
      ctx.save();
      // vertical line
      ctx.beginPath();
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.setLineDash([3, 4]);
      ctx.strokeStyle = 'rgba(108,142,245,0.35)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // glow dots on each dataset at hover index
      const idx = chart._hoverIdx;
      if (idx == null) { ctx.restore(); return; }
      chart.data.datasets.forEach((ds, di) => {
        const val = ds.data[idx];
        if (val == null) return;
        const meta = chart.getDatasetMeta(di);
        const pt   = meta.data[idx];
        if (!pt) return;
        const color = ds.borderColor;
        // outer glow ring
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 9, 0, Math.PI * 2);
        ctx.fillStyle = color + '22';
        ctx.fill();
        // middle ring
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = color + '44';
        ctx.fill();
        // solid dot
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      });
      ctx.restore();
    },
  };

  function positionTooltip(chart, x) {
    const wrap   = detailChartWrap;
    const wWidth = wrap.clientWidth;
    const ttW    = tooltip.offsetWidth || 160;
    // keep tooltip inside the wrap
    let left = x + 14;
    if (left + ttW > wWidth - 12) left = x - ttW - 14;
    tooltip.style.left = left + 'px';
    tooltip.style.top  = (chart.chartArea.top + 4) + 'px';
  }

  function renderChart(allSeries) {
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    tooltip.classList.remove('visible');

    // Flatten all timestamps to build a shared sorted x-axis
    const tsSet = new Set();
    allSeries.forEach(s => (s.points || []).forEach(p => tsSet.add(p.timestamp)));
    if (tsSet.size === 0) { detailChartWrap.style.display = 'none'; return; }

    const sortedTs = [...tsSet].sort((a, b) => a - b);
    const labels   = sortedTs.map(ts => {
      const d = new Date(ts / 1e6);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    });

    // full date+time for tooltip title
    const labelsFull = sortedTs.map(ts => {
      const d = new Date(ts / 1e6);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
    });

    const fewPoints = sortedTs.length <= 3;

    const datasets = allSeries.map((s, i) => {
      const ptMap = new Map((s.points || []).map(p => [p.timestamp, p.value]));
      const color = SERIES_COLORS[i % SERIES_COLORS.length];
      return {
        label: Object.entries(s.labels || {}).map(([k, v]) => `${k}=${v}`).join(', ') || 'value',
        data:  sortedTs.map(ts => ptMap.has(ts) ? ptMap.get(ts) : null),
        borderColor:     color,
        backgroundColor: color + '18',
        borderWidth: 1.5,
        pointRadius: fewPoints ? 4 : 0,
        pointBackgroundColor: color,
        pointHoverRadius: 0,   // handled by plugin
        tension: 0.35,
        fill: allSeries.length === 1,
        spanGaps: false,
      };
    });

    detailChartWrap.style.display = 'block';
    chartInstance = new Chart(detailCanvas, {
      type: 'line',
      data: { labels, datasets },
      plugins: [crosshairPlugin],
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        onHover(event, elements, chart) {
          if (!elements.length) {
            chart._hoverX = null;
            chart._hoverIdx = null;
            tooltip.classList.remove('visible');
            chart.draw();
            return;
          }
          const idx = elements[0].index;
          const pt  = elements[0].element;
          chart._hoverX   = pt.x;
          chart._hoverIdx = idx;

          // Build tooltip content
          const rows = datasets.map((ds, di) => {
            const val = ds.data[idx];
            const color = ds.borderColor;
            return `<div class="chart-tooltip-row">
              <span class="chart-tooltip-dot" style="background:${color};box-shadow:0 0 5px ${color}88"></span>
              <span class="chart-tooltip-name">${esc(ds.label)}</span>
              <span class="chart-tooltip-val">${val != null ? val.toFixed(6) : '—'}</span>
            </div>`;
          }).join('');

          tooltip.innerHTML = `<div class="chart-tooltip-time">${esc(labelsFull[idx])}</div>${rows}`;
          tooltip.classList.add('visible');
          positionTooltip(chart, pt.x);
          chart.draw();
        },
        plugins: {
          legend: {
            display: allSeries.length > 1,
            labels: { color: '#64748b', font: { size: 11 }, boxWidth: 8, padding: 12 },
          },
          tooltip: { enabled: false },
        },
        scales: {
          x: {
            ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 6, maxRotation: 0 },
            grid: { color: '#2a2d3a' },
            border: { color: '#2a2d3a' },
          },
          y: {
            ticks: { color: '#64748b', font: { size: 10 } },
            grid: { color: '#2a2d3a' },
            border: { color: '#2a2d3a' },
          },
        },
      },
    });

    detailCanvas.style.height = '130px';

    detailCanvas.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
      chartInstance._hoverX   = null;
      chartInstance._hoverIdx = null;
      chartInstance.draw();
    });
  }

  const aggFnEl     = document.getElementById('agg-fn');
  const aggWindowEl = document.getElementById('agg-window');

  let currentDetailMetric = null;
  let currentDetailLabels = null;

  function fetchDetail() {
    const metric = currentDetailMetric;
    const labels = currentDetailLabels;
    if (!metric) return;

    detailBody.innerHTML = '<div class="detail-loading">Loading…</div>';
    detailChartWrap.style.display = 'none';

    const tags = Object.entries(labels);
    const { fromNs, toNs } = getTimeRange();
    const qp = new URLSearchParams({ metric });
    for (const [k, v] of tags) qp.append('labels', `${k}=${v}`);
    if (fromNs) qp.set('from', Math.round(fromNs).toString());
    if (toNs)   qp.set('to',   Math.round(toNs).toString());

    const fn = aggFnEl.value;
    if (fn) {
      qp.set('agg', fn);
      qp.set('window', aggWindowEl.value);
    }

    fetch(`/api/query?${qp}`)
      .then(r => r.json())
      .then(data => {
        const series = data.series || [];

        if (series.length === 0) {
          detailBody.innerHTML = '<div class="detail-loading">No data in selected range</div>';
          return;
        }

        renderChart(series);

        const showSeriesHeader = series.length > 1;
        detailBody.innerHTML = series.map(s => {
          const sLabels = Object.entries(s.labels || {});
          const points = [...(s.points || [])].sort((a, b) => b.timestamp - a.timestamp);
          const rows = points.map((p, i) => {
            const ts = new Date(p.timestamp / 1e6);
            return `<tr>
              <td style="color:var(--muted)">${i + 1}</td>
              <td>${ts.toLocaleDateString()} ${ts.toLocaleTimeString()}</td>
              <td style="color:var(--accent)">${p.value.toFixed(6)}</td>
            </tr>`;
          }).join('');

          const header = showSeriesHeader ? `
            <div style="padding:8px 16px;font-size:11px;background:rgba(255,255,255,.03);display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              ${sLabels.length
                ? sLabels.map(([k, v]) => `<span class="tag">${esc(k)}=<b>${esc(v)}</b></span>`).join(' ')
                : '<span style="color:var(--muted);font-style:italic">no labels</span>'}
              <span style="margin-left:auto;color:var(--muted)">${points.length} pts</span>
            </div>` : '';

          return `<div style="border-bottom:1px solid var(--border)">
            ${header}
            <table class="detail-table">
              <thead><tr><th>#</th><th>Time</th><th>Value</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
        }).join('');
      })
      .catch(() => {
        detailBody.innerHTML = '<div class="detail-loading">Failed to load</div>';
      });
  }

  function closeDetail() {
    detail.classList.remove('open');
    tooltip.classList.remove('visible');
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  }

  function openDetail(metric, labels) {
    currentDetailMetric = metric;
    currentDetailLabels = labels;

    detailTitle.textContent = metric;

    const tags = Object.entries(labels);
    detailMeta.innerHTML = tags.length
      ? tags.map(([k, v]) => `<span class="tag">${esc(k)}=<b>${esc(v)}</b></span>`).join('')
      : '<span style="color:var(--muted)">no labels</span>';

    detail.classList.add('open');
    fetchDetail();
  }

  detailClose.addEventListener('click', closeDetail);

  aggFnEl.addEventListener('change', () => {
    aggWindowEl.disabled = !aggFnEl.value;
    if (currentDetailMetric) fetchDetail();
  });

  aggWindowEl.addEventListener('change', () => {
    if (currentDetailMetric) fetchDetail();
  });

  document.getElementById('tbody').addEventListener('click', e => {
    const tr = e.target.closest('tr[data-metric]');
    if (!tr) return;
    const metric = tr.dataset.metric;
    let labels = {};
    try { labels = JSON.parse(tr.dataset.labels); } catch {}
    openDetail(metric, labels);
  });

  // close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });
})();
</script>

<script>
(function() {
  const outer = document.getElementById('header-outer');
  let scale = 1, velocity = 0, target = 1, rafId = null;
  const STIFFNESS = 0.3, DAMPING = 0.6;

  function loop() {
    const force = (target - scale) * STIFFNESS;
    velocity = (velocity + force) * DAMPING;
    scale += velocity;
    outer.style.transform = `scale(${scale})`;
    if (Math.abs(target - scale) < 0.0005 && Math.abs(velocity) < 0.0005) {
      scale = target;
      outer.style.transform = `scale(${scale})`;
      rafId = null;
    } else {
      rafId = requestAnimationFrame(loop);
    }
  }

  function startAnim() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  const svg = document.getElementById('header-logo');
  svg.addEventListener('mousedown', () => { target = 0.6; startAnim(); });
  window.addEventListener('mouseup',   () => { target = 1;   startAnim(); });
  svg.addEventListener('touchstart', (e) => { e.preventDefault(); target = 0.6; startAnim(); }, { passive: false });
  window.addEventListener('touchend', () => { target = 1; startAnim(); });
})();
</script>
