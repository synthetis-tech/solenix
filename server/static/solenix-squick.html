
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
    }
    svg { cursor: pointer; user-select: none; -webkit-user-select: none; }
  </style>
</head>
<body>

<svg id="logo" width="220" height="220" viewBox="0 0 49 49" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- external part - doesnt squeeze -->
  <g id="outer" style="transform-origin: 24.36px 24.36px;">
    <path fill="#F78F3F" d="
      M27.5907 34.1098V48.4886C25.472 48.7766 23.2707 48.7578 21.128 48.4766V40.0751H24.36V38.0871H21.128V31.4431C22.1147 31.8938 23.204 32.1618 24.36 32.1618C26.6547 32.1618 28.7027 31.1485 30.1333 29.5671H38.0987V34.1098H27.5907Z
      M8.632 21.1151V24.3471H10.62V21.1151H17.264C16.812 22.1045 16.544 23.1911 16.544 24.3471C16.544 26.6431 17.5573 28.6898 19.1387 30.1205V38.0871H14.596V27.5791L0.218653 27.5778C0.0746527 26.5151 0 25.4365 0 24.3471C0 23.2671 0.0933345 22.1858 0.234668 21.1151H8.632Z
      M21.128 14.5845V0.207142C23.2507 -0.0795248 25.456 -0.062198 27.5907 0.219135L27.592 8.62047H24.36V10.6085H27.592V17.2538C26.604 16.8005 25.5147 16.5325 24.36 16.5325C22.0627 16.5325 20.016 17.5458 18.5853 19.1285H10.62V14.5845H21.128Z
      M40.0867 27.5791V24.3471H38.0987V27.5791H31.4547C31.9067 26.5911 32.1747 25.5031 32.1747 24.3471C32.1747 22.0511 31.1613 20.0045 29.5787 18.5738V10.6085H34.1213V21.1151L48.5 21.1178C48.644 22.1805 48.7187 23.2578 48.7187 24.3471C48.7187 25.4298 48.6253 26.5098 48.484 27.5791H40.0867Z
    "/>
  </g>

  <!-- center — doesn't move -->
  <circle fill="#F78F3F" cx="24.36" cy="24.36" r="5.82"/>

</svg>

<script>
(function() {
  const outer = document.getElementById('outer');

  let scale = 1;
  let velocity = 0;
  let target = 1;
  let rafId = null;

  const STIFFNESS = 0.3;
  const DAMPING = 0.6;

  function loop() {
    const force = (target - scale) * STIFFNESS;
    velocity = (velocity + force) * DAMPING;
    scale += velocity;

    outer.style.transform = `scale(${scale})`;

    if (Math.abs(target - scale) < 0.0005 && Math.abs(velocity) < 0.0005) {
      scale = target;
      outer.style.transform = `scale(${scale})`;
      rafId = null;
    } else {
      rafId = requestAnimationFrame(loop);
    }
  }

  function startAnim() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  const svg = document.getElementById('logo');

  svg.addEventListener('mousedown', () => { target = 0.6; startAnim(); });
  window.addEventListener('mouseup',   () => { target = 1;   startAnim(); });

  svg.addEventListener('touchstart', (e) => {
    e.preventDefault();
    target = 0.6;
    startAnim();
  }, { passive: false });

  window.addEventListener('touchend', () => { target = 1; startAnim(); });
})();
</script>

</body>
</html>
